<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeForge Pro — Professional Resume Builder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--editor-bg:#f8fafc;--editor-border:#e2e8f0;--accent:#3b82f6;
--accent-hover:#2563eb;--text:#1e293b;--text-light:#64748b;
--input-bg:#fff;--input-border:#cbd5e1;--input-focus:#3b82f6;
--shadow:0 1px 3px rgba(0,0,0,.1);--radius:8px;
}
html,body{height:100%;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--text);background:#eef2f7}
#app{display:flex;flex-direction:column;height:100vh}
.toolbar{
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:#fff;border-bottom:1px solid var(--editor-border);
  box-shadow:var(--shadow);z-index:10;flex-shrink:0;
}
.toolbar .logo{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-right:8px}
.toolbar .logo span{color:var(--accent)}
.toolbar select,.toolbar button{
  padding:7px 14px;border:1px solid var(--input-border);border-radius:6px;
  font-size:13px;background:#fff;cursor:pointer;color:var(--text);
  transition:all .15s;
}
.toolbar select:hover,.toolbar button:hover{border-color:var(--accent);color:var(--accent)}
.toolbar .btn-primary{
  background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;
}
.toolbar .btn-primary:hover{background:var(--accent-hover)}
.toolbar .separator{width:1px;height:24px;background:var(--editor-border)}
.color-dots{display:flex;gap:6px;align-items:center}
.color-dot{
  width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:all .15s;
}
.color-dot:hover,.color-dot.active{border-color:var(--text);transform:scale(1.15)}
.main{display:flex;flex:1;overflow:hidden}
.editor{
  width:42%;overflow-y:auto;padding:20px;background:var(--editor-bg);
  border-right:1px solid var(--editor-border);
}
.section{
  background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
  margin-bottom:14px;overflow:hidden;
}
.section-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;cursor:pointer;user-select:none;
  border-bottom:1px solid transparent;transition:all .15s;
}
.section-header:hover{background:#f1f5f9}
.section-header.open{border-bottom-color:var(--editor-border)}
.section-header h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header .chevron{transition:transform .2s;font-size:12px;color:var(--text-light)}
.section-header.open .chevron{transform:rotate(90deg)}
.section-body{padding:16px 18px;display:none}
.section-body.open{display:block}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row>*{flex:1}
.form-group{margin-bottom:12px}
.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:8px 12px;border:1px solid var(--input-border);border-radius:6px;
  font-size:13px;font-family:inherit;color:var(--text);background:var(--input-bg);
  transition:border-color .15s;
}
.form-group input:focus,.form-group textarea:focus{
  outline:none;border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(59,130,246,.1);
}
.form-group textarea{resize:vertical;min-height:80px}
.entry-card{
  background:#f8fafc;border:1px solid var(--editor-border);border-radius:6px;
  padding:14px;margin-bottom:10px;position:relative;
}
.entry-card:last-child{margin-bottom:0}
.remove-entry{
  position:absolute;top:8px;right:8px;background:none;border:none;
  color:#ef4444;cursor:pointer;font-size:16px;line-height:1;padding:4px;
  border-radius:4px;transition:background .15s;
}
.remove-entry:hover{background:#fef2f2}
.add-entry{
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:none;border:1px dashed var(--input-border);border-radius:6px;
  color:var(--accent);font-size:13px;cursor:pointer;width:100%;
  transition:all .15s;font-weight:500;
}
.add-entry:hover{border-color:var(--accent);background:#eff6ff}
.checkbox-row{display:flex;align-items:center;gap:6px}
.checkbox-row input[type=checkbox]{width:auto}
.checkbox-row label{font-size:13px;font-weight:400;text-transform:none;letter-spacing:0;margin:0}
.preview-area{
  flex:1;overflow-y:auto;padding:30px;
  background:#e2e8f0;display:flex;justify-content:center;align-items:flex-start;
}
.preview-wrapper{
  width:794px;min-height:1123px;background:#fff;
  box-shadow:0 4px 24px rgba(0,0,0,.15);transform-origin:top center;
  transition:transform .2s;
}
.preview-scaler{transform-origin:top center;padding-bottom:30px}

/* ===== RESUME BASE ===== */
.resume{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#1e293b;line-height:1.5}

/* ===== TEMPLATE: MODERN ===== */
.resume.modern{padding:0;position:relative}
.resume.modern .modern-header{
  padding:32px 36px 24px;color:#fff;
}
.resume.modern .modern-header h1{font-size:28px;font-weight:700;margin:0;line-height:1.2}
.resume.modern .modern-header .subtitle{font-size:15px;opacity:.9;margin-top:4px;font-weight:400}
.resume.modern .modern-header .contact-line{
  display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px;opacity:.85
}
.resume.modern .modern-body{display:flex;gap:0}
.resume.modern .modern-sidebar{
  width:220px;padding:24px 20px 24px 28px;flex-shrink:0;
}
.resume.modern .modern-main{flex:1;padding:24px 32px 24px 24px}
.resume.modern .section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid;
}
.resume.modern .exp-item{margin-bottom:14px}
.resume.modern .exp-item:last-child{margin-bottom:0}
.resume.modern .exp-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap}
.resume.modern .exp-company{font-size:14px;font-weight:700}
.resume.modern .exp-role{font-size:13px;font-weight:500;opacity:.8}
.resume.modern .exp-date{font-size:11px;opacity:.7}
.resume.modern .exp-desc{font-size:12px;margin-top:4px;white-space:pre-line;opacity:.85}
.resume.modern .skill-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;font-size:12px;
}
.resume.modern .skill-bar-bg{
  width:60px;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden
}
.resume.modern .skill-bar{height:100%;border-radius:3px;transition:width .3s}
.resume.modern .lang-item{font-size:12px;padding:3px 0;display:flex;justify-content:space-between}
.resume.modern .edu-item{margin-bottom:10px;font-size:12px}
.resume.modern .edu-school{font-weight:700;font-size:13px}
.resume.modern .edu-degree{opacity:.85}
.resume.modern .edu-date{opacity:.65;font-size:11px}
.resume.modern .proj-item{margin-bottom:10px}
.resume.modern .proj-name{font-size:13px;font-weight:700}
.resume.modern .proj-desc{font-size:12px;opacity:.85;margin-top:2px}
.resume.modern .summary-text{font-size:13px;opacity:.85;line-height:1.6}
.resume.modern .cert-item{font-size:12px;padding:3px 0}

/* ===== TEMPLATE: CLASSIC ===== */
.resume.classic{padding:40px 48px;font-family:Georgia,'Times New Roman',serif}
.resume.classic .classic-header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1e293b}
.resume.classic .classic-header h1{font-size:30px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.resume.classic .classic-header .subtitle{font-size:15px;color:var(--text-light);margin-top:4px;font-style:italic}
.resume.classic .classic-header .contact-line{
  display:flex;justify-content:center;flex-wrap:wrap;gap:8px 16px;
  margin-top:10px;font-size:12px;color:var(--text-light);font-family:system-ui,sans-serif
}
.resume.classic .classic-section{margin-bottom:18px}
.resume.classic .classic-title{
  font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #94a3b8;
}
.resume.classic .classic-item{margin-bottom:12px}
.resume.classic .classic-item-header{display:flex;justify-content:space-between;align-items:baseline}
.resume.classic .classic-item-title{font-size:14px;font-weight:700}
.resume.classic .classic-item-date{font-size:12px;color:var(--text-light);font-style:italic}
.resume.classic .classic-item-sub{font-size:13px;color:var(--text-light);margin-top:1px}
.resume.classic .classic-item-desc{font-size:13px;margin-top:4px;white-space:pre-line;line-height:1.6}
.resume.classic .classic-summary{font-size:13px;line-height:1.7;text-align:justify}
.resume.classic .classic-skills{display:flex;flex-wrap:wrap;gap:6px}
.resume.classic .classic-skill{
  padding:3px 12px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;
  font-family:system-ui,sans-serif;
}
.resume.classic .classic-langs{font-size:13px;font-family:system-ui,sans-serif}
.resume.classic .classic-lang-item{padding:2px 0}

/* ===== TEMPLATE: MINIMAL ===== */
.resume.minimal{padding:44px 48px;font-family:system-ui,-apple-system,sans-serif}
.resume.minimal .minimal-header{margin-bottom:24px}
.resume.minimal .minimal-header h1{font-size:32px;font-weight:300;letter-spacing:-.5px}
.resume.minimal .minimal-header .subtitle{font-size:14px;font-weight:400;color:var(--text-light);margin-top:2px}
.resume.minimal .minimal-header .contact-line{
  display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:10px;font-size:12px;color:var(--text-light);
}
.resume.minimal .minimal-header .contact-line span::after{content:"·";margin-left:14px;color:#cbd5e1}
.resume.minimal .minimal-header .contact-line span:last-child::after{display:none}
.resume.minimal .minimal-section{margin-bottom:22px}
.resume.minimal .minimal-title{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:10px;color:var(--text-light);
}
.resume.minimal .minimal-item{margin-bottom:12px}
.resume.minimal .minimal-item-header{display:flex;justify-content:space-between;align-items:baseline}
.resume.minimal .minimal-item-name{font-size:14px;font-weight:600}
.resume.minimal .minimal-item-date{font-size:12px;color:var(--text-light)}
.resume.minimal .minimal-item-sub{font-size:13px;color:var(--text-light);margin-top:1px}
.resume.minimal .minimal-item-desc{font-size:13px;margin-top:4px;white-space:pre-line;line-height:1.6;color:#334155}
.resume.minimal .minimal-summary{font-size:13px;line-height:1.7;color:#334155}
.resume.minimal .minimal-skills{display:flex;flex-wrap:wrap;gap:8px;font-size:13px;color:#334155}
.resume.minimal .minimal-skills span::after{content:","}
.resume.minimal .minimal-skills span:last-child::after{display:none}
.resume.minimal .minimal-line{height:1px;background:#e2e8f0;margin:0 0 18px}

/* ===== TEMPLATE: CREATIVE ===== */
.resume.creative{padding:0;font-family:system-ui,-apple-system,sans-serif}
.resume.creative .creative-banner{padding:36px 40px 28px;color:#fff;position:relative;overflow:hidden}
.resume.creative .creative-banner::after{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,.08);
}
.resume.creative .creative-banner::before{
  content:'';position:absolute;bottom:-40px;left:30%;width:80px;height:80px;
  border-radius:50%;background:rgba(255,255,255,.05);
}
.resume.creative .creative-banner h1{font-size:32px;font-weight:800;position:relative;z-index:1}
.resume.creative .creative-banner .subtitle{font-size:16px;font-weight:300;opacity:.9;margin-top:4px;position:relative;z-index:1}
.resume.creative .creative-banner .contact-line{
  display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12px;opacity:.85;position:relative;z-index:1
}
.resume.creative .creative-body{padding:28px 40px 32px}
.resume.creative .creative-section{margin-bottom:22px}
.resume.creative .creative-title{
  font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.resume.creative .creative-title::after{content:'';flex:1;height:2px;border-radius:1px;opacity:.3}
.resume.creative .creative-item{margin-bottom:14px;padding-left:14px;border-left:3px solid transparent}
.resume.creative .creative-item:last-child{margin-bottom:0}
.resume.creative .creative-item-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap}
.resume.creative .creative-item-name{font-size:14px;font-weight:700}
.resume.creative .creative-item-date{font-size:11px;color:var(--text-light);font-weight:500}
.resume.creative .creative-item-sub{font-size:13px;color:var(--text-light)}
.resume.creative .creative-item-desc{font-size:12px;margin-top:4px;white-space:pre-line;line-height:1.6;color:#475569}
.resume.creative .creative-summary{font-size:13px;line-height:1.7;color:#475569}
.resume.creative .creative-skills{display:flex;flex-wrap:wrap;gap:8px}
.resume.creative .creative-skill{
  padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;
}
.resume.creative .creative-langs{font-size:13px;color:#475569}
.resume.creative .creative-lang-item{padding:3px 0;display:flex;justify-content:space-between;max-width:300px}
.resume.creative .creative-cert{font-size:13px;padding:3px 0;color:#475569}

/* ===== PRINT ===== */
@media print{
  body *{visibility:hidden}
  .print-frame,.print-frame *{visibility:visible}
  .print-frame{position:absolute;left:0;top:0;width:100%}
  @page{margin:0;size:A4}
}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="logo">Resume<span>Forge</span> Pro</div>
    <div class="separator"></div>
    <label style="font-size:12px;font-weight:600;color:var(--text-light)">Template</label>
    <select id="templateSelect">
      <option value="modern">Modern</option>
      <option value="classic">Classic</option>
      <option value="minimal">Minimal</option>
      <option value="creative">Creative</option>
    </select>
    <label style="font-size:12px;font-weight:600;color:var(--text-light)">Theme</label>
    <div class="color-dots" id="colorDots">
      <div class="color-dot active" data-color="#1e3a5f" style="background:#1e3a5f" title="Navy"></div>
      <div class="color-dot" data-color="#334155" style="background:#334155" title="Slate"></div>
      <div class="color-dot" data-color="#065f46" style="background:#065f46" title="Emerald"></div>
      <div class="color-dot" data-color="#7f1d1d" style="background:#7f1d1d" title="Burgundy"></div>
      <div class="color-dot" data-color="#5b21b6" style="background:#5b21b6" title="Violet"></div>
    </div>
    <div class="separator"></div>
    <button onclick="exportJSON()" title="Save resume data">💾 Save</button>
    <button onclick="importJSON()" title="Load resume data">📂 Load</button>
    <button onclick="loadSample()" title="Load sample data">📝 Sample</button>
    <div style="flex:1"></div>
    <button class="btn-primary" onclick="exportPDF()">📄 Export PDF</button>
  </div>
  <div class="main">
    <div class="editor" id="editor"></div>
    <div class="preview-area" id="previewArea">
      <div class="preview-scaler" id="previewScaler">
        <div class="preview-wrapper" id="previewWrapper"></div>
      </div>
    </div>
  </div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileImport(event)">
<div class="print-frame" id="printFrame"></div>
<script>
let data={
  personal:{fullName:'',title:'',email:'',phone:'',location:'',website:'',linkedin:'',github:''},
  summary:'',
  experience:[{company:'',title:'',startDate:'',endDate:'',current:false,description:''}],
  education:[{school:'',degree:'',startDate:'',endDate:'',description:''}],
  skills:[{name:'',level:80}],
  projects:[{name:'',description:'',link:''}],
  languages:[{name:'',level:'Native'}],
  certifications:[{name:'',issuer:'',date:''}]
};
let currentTemplate='modern';
let currentColor='#1e3a5f';

function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderEditor(){
  const e=document.getElementById('editor');
  e.innerHTML=`
    ${sectionHTML('Personal Information','👤',true,`
      <div class="form-row"><div class="form-group"><label>Full Name</label><input data-field="personal.fullName" placeholder="John Doe"></div><div class="form-group"><label>Job Title</label><input data-field="personal.title" placeholder="Software Engineer"></div></div>
      <div class="form-row"><div class="form-group"><label>Email</label><input data-field="personal.email" placeholder="john@example.com" type="email"></div><div class="form-group"><label>Phone</label><input data-field="personal.phone" placeholder="(555) 123-4567"></div></div>
      <div class="form-group"><label>Location</label><input data-field="personal.location" placeholder="San Francisco, CA"></div>
      <div class="form-row"><div class="form-group"><label>Website</label><input data-field="personal.website" placeholder="yoursite.com"></div><div class="form-group"><label>LinkedIn</label><input data-field="personal.linkedin" placeholder="linkedin.com/in/you"></div></div>
      <div class="form-group"><label>GitHub</label><input data-field="personal.github" placeholder="github.com/you"></div>
    `)}
    ${sectionHTML('Professional Summary','📝',true,`
      <div class="form-group"><textarea data-field="summary" placeholder="Brief overview of your professional background and key strengths..." rows="4"></textarea></div>
    `)}
    ${sectionHTML('Work Experience','💼',true,renderEntries('experience',exp=>`
      <div class="form-row"><div class="form-group"><label>Company</label><input data-field="experience.${exp.i}.company" placeholder="Company Name"></div><div class="form-group"><label>Job Title</label><input data-field="experience.${exp.i}.title" placeholder="Senior Developer"></div></div>
      <div class="form-row"><div class="form-group"><label>Start Date</label><input data-field="experience.${exp.i}.startDate" placeholder="Jan 2020"></div><div class="form-group"><label>End Date</label><input data-field="experience.${exp.i}.endDate" placeholder="Present"></div></div>
      <div class="checkbox-row" style="margin-bottom:10px"><input type="checkbox" data-field="experience.${exp.i}.current" id="cur${exp.i}"><label for="cur${exp.i}">Currently working here</label></div>
      <div class="form-group"><label>Description</label><textarea data-field="experience.${exp.i}.description" placeholder="Key achievements and responsibilities..." rows="3"></textarea></div>
    `))}
    ${sectionHTML('Education','🎓',false,renderEntries('education',edu=>`
      <div class="form-row"><div class="form-group"><label>School</label><input data-field="education.${edu.i}.school" placeholder="University Name"></div><div class="form-group"><label>Degree</label><input data-field="education.${edu.i}.degree" placeholder="B.S. Computer Science"></div></div>
      <div class="form-row"><div class="form-group"><label>Start Date</label><input data-field="education.${edu.i}.startDate" placeholder="Sep 2016"></div><div class="form-group"><label>End Date</label><input data-field="education.${edu.i}.endDate" placeholder="Jun 2020"></div></div>
      <div class="form-group"><label>Description</label><textarea data-field="education.${edu.i}.description" placeholder="Relevant coursework, honors..." rows="2"></textarea></div>
    `))}
    ${sectionHTML('Skills','⚡',false,renderEntries('skills',sk=>`
      <div class="form-row"><div class="form-group"><label>Skill</label><input data-field="skills.${sk.i}.name" placeholder="JavaScript"></div><div class="form-group"><label>Level</label><select data-field="skills.${sk.i}.level"><option value="90">Expert</option><option value="80" selected>Advanced</option><option value="60">Intermediate</option><option value="40">Beginner</option></select></div></div>
    `))}
    ${sectionHTML('Projects','🚀',false,renderEntries('projects',pr=>`
      <div class="form-group"><label>Project Name</label><input data-field="projects.${pr.i}.name" placeholder="Project Name"></div>
      <div class="form-group"><label>Description</label><textarea data-field="projects.${pr.i}.description" placeholder="Brief description of the project..." rows="2"></textarea></div>
      <div class="form-group"><label>Link</label><input data-field="projects.${pr.i}.link" placeholder="github.com/user/project"></div>
    `))}
    ${sectionHTML('Languages','🌍',false,renderEntries('languages',lg=>`
      <div class="form-row"><div class="form-group"><label>Language</label><input data-field="languages.${lg.i}.name" placeholder="English"></div><div class="form-group"><label>Proficiency</label><select data-field="languages.${lg.i}.level"><option>Native</option><option>Fluent</option><option>Advanced</option><option>Intermediate</option><option>Basic</option></select></div></div>
    `))}
    ${sectionHTML('Certifications','📜',false,renderEntries('certifications',ct=>`
      <div class="form-row"><div class="form-group"><label>Name</label><input data-field="certifications.${ct.i}.name" placeholder="AWS Solutions Architect"></div><div class="form-group"><label>Issuer</label><input data-field="certifications.${ct.i}.issuer" placeholder="Amazon Web Services"></div></div>
      <div class="form-group"><label>Date</label><input data-field="certifications.${ct.i}.date" placeholder="Mar 2023"></div>
    `))}
  `;
  bindEditor();
}

function sectionHTML(title,icon,defaultOpen,body){
  return `<div class="section"><div class="section-header${defaultOpen?' open':''}" onclick="toggleSection(this)"><h3>${icon} ${title}</h3><span class="chevron">▶</span></div><div class="section-body${defaultOpen?' open':''}">${body}</div></div>`;
}

function renderEntries(field,fn){
  let html='';
  for(let i=0;i<data[field].length;i++){
    html+=`<div class="entry-card">${fn({i})}${data[field].length>1?`<button class="remove-entry" onclick="removeEntry('${field}',${i})" title="Remove">✕</button>`:''}</div>`;
  }
  html+=`<button class="add-entry" onclick="addEntry('${field}')">+ Add ${field==='certifications'?'Certification':field.slice(0,-1).replace(/^./,c=>c.toUpperCase())}</button>`;
  return html;
}

function toggleSection(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}

function addEntry(field){
  const defaults={experience:{company:'',title:'',startDate:'',endDate:'',current:false,description:''},education:{school:'',degree:'',startDate:'',endDate:'',description:''},skills:{name:'',level:80},projects:{name:'',description:'',link:''},languages:{name:'',level:'Native'},certifications:{name:'',issuer:'',date:''}};
  data[field].push({...defaults[field]});
  renderEditor();populateEditor();renderPreview();
}

function removeEntry(field,i){data[field].splice(i,1);renderEditor();populateEditor();renderPreview()}

function bindEditor(){
  document.querySelectorAll('#editor [data-field]').forEach(el=>{
    const evt=el.type==='checkbox'?'change':'input';
    el.addEventListener(evt,e=>{
      const path=e.target.dataset.field.split('.');
      let obj=data;
      for(let k=0;k<path.length-1;k++) obj=obj[path[k]];
      obj[path[path.length-1]]=e.target.type==='checkbox'?e.target.checked:e.target.value;
      renderPreview();
    });
  });
}

function populateEditor(){
  document.querySelectorAll('#editor [data-field]').forEach(el=>{
    const path=el.dataset.field.split('.');
    let val=data;
    for(const k of path) val=val?.[k];
    if(val===undefined) val='';
    if(el.type==='checkbox') el.checked=val;
    else el.value=val;
  });
}

function renderPreview(){
  const w=document.getElementById('previewWrapper');
  const c=currentColor;
  const rgb=hexToRgb(c);
  const light=`rgba(${rgb.r},${rgb.g},${rgb.b},.08)`;
  switch(currentTemplate){
    case 'modern': w.innerHTML=renderModern(c,rgb,light);break;
    case 'classic': w.innerHTML=renderClassic(c);break;
    case 'minimal': w.innerHTML=renderMinimal(c);break;
    case 'creative': w.innerHTML=renderCreative(c,rgb,light);break;
  }
  scalePreview();
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b}}

function scalePreview(){
  const area=document.getElementById('previewArea');
  const scaler=document.getElementById('previewScaler');
  if(!area||!scaler)return;
  const aw=area.clientWidth-60;
  const scale=Math.min(1,aw/794);
  scaler.style.transform=`scale(${scale})`;
  scaler.style.width=794/scale+'px';
  document.getElementById('previewWrapper').style.transformOrigin='top center';
}

function exportPDF(){
  const content=document.getElementById('previewWrapper').innerHTML;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Resume</title><style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{margin:0;padding:0}
  ${document.querySelector('style').textContent}
  @page{margin:0;size:A4}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>${content}</body></html>`);
  win.document.close();
  setTimeout(()=>{win.print()},500);
}

function handleFileImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{data=JSON.parse(ev.target.result);renderEditor();populateEditor();renderPreview()}catch(err){alert('Invalid JSON file')}};
  reader.readAsText(file);
  e.target.value='';
}
